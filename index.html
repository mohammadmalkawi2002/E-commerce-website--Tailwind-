<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Shop the latest smartphones, accessories, and tech essentials at Cyber with sleek design, reliable products, and a smooth online shopping experience.">
    <title>Home</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class=" py-6 md:py-4 sticky top-0 z-50 shadow-sm bg-primary-white">
        <div class="container row  justify-between lg:gap-[56.53px]  ">


            <a href="#" class="shrink-0">
                <img src="./assets/imgs/header/Logo.svg" alt="Cyber">
            </a>


            <div class="  search relative hidden md:block    ">

                <img src="./assets/imgs/header/Vector.svg" alt="" class="absolute left-4 top-1/2  translate-y-[-50%] ">
                <input type="text" placeholder="Search..."
                    class="  w-full max-w-[372px] px-[40px] py-[16px]  rounded-lg bg-search-bg text-sm   " />
            </div>




            <nav class="hidden lg:block">
                <ul class="row gap-13">
                    <li>
                        <a href="./index.html" class="nav-link ">
                            Home
                        </a>
                    </li>
                    <li>
                        <a href="http://" class="nav-link">
                            About
                        </a>
                    </li>
                    <li>
                        <a href="http://" class="nav-link">
                            Contact Us
                        </a>
                    </li>
                    <li>
                        <a href="http://" class="nav-link">
                            Blog
                        </a>
                    </li>

                </ul>
            </nav>


            <ul class=" hidden lg:row  gap-6 ">
                <li>
                    <a href="http://">
                        <img src="./assets/imgs/header/Favorites.svg" alt="" srcset="">
                    </a>
                </li>
                <li>
                    <a href="http://">
                        <img src="./assets/imgs/header/Cart.svg" alt="" srcset="">
                    </a>
                </li>
                <li>
                    <a href="http://">
                        <img src="./assets/imgs/header/User.svg" alt="" srcset="">
                    </a>
                </li>

            </ul>

            <div class="menu-btn lg:hidden ">
                <button type="button" class="grid size-10 place-items-center  ">
                    <img src="./assets/imgs/header/Union.svg" alt="" srcset="">
                </button>
            </div>





        </div>



    </header>


    <main>
        <section class="hero bg-hero-bg  h-[calc(100vh - 84px)]">
            <div
                class="container py-22 flex-col gap-12  row justify-between  text-center  lg:flex-row lg:gap-0 lg:text-left  lg:py-0  h-full">
                <div class="content gap-4  row flex-col lg:gap-6   lg:items-start ">
                    <span class="text-[24px] font-semibold text-primary-white opacity-40  leading-8 ">Pro.Beyond.</span>
                    <h1
                        class=" text-[72px]  font-thin lg:text-[96px] text-primary-white  leading-18 lg:leading-24 tracking-normal">
                        IPhone 14
                        <span class=" block lg:inline font-bold">Pro</span>
                    </h1>
                    <p class="text-paragraph max-w-140 text-[18px] font-medium leading-6 ">
                        Created to change
                        everything for
                        the better. For everyone
                    </p>


                    <a href="http://" class="button ">Shop Now

                        <img src="./assets/imgs/Arrow Down.svg" alt="" class="">
                    </a>




                </div>

                <div class="iphone-img  w-full lg:w-auto flex justify-center lg:self-stretch ">
                    <img src="./assets/imgs/Iphone.png" alt="" srcset="">
                </div>
            </div>
        </section>



        <section class="categories bg-[#FAFAFA] py-16 lg:py-20">
            <div class="container">
                <div class="top row justify-between mb-8">
                    <h3 class="leading-8 font-medium min-w-59.75">Browse By Category</h3>
                    <div class="imgs row gap-4">
                        <button class="slider-prev ">
                            <img src="./assets/imgs/category_Section/LeftArrow.svg" alt="">
                        </button>
                        <button class="slider-next ">
                            <img src="./assets/imgs/category_Section/RightArrow.svg" alt="">
                        </button>
                    </div>
                </div>

                <div class="items grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 lg:gap-8">
                    <div class="category-card">
                        <img src="./assets/imgs/category_Section/Phones.png" alt="Phones category">
                        <h5>Phones</h5>
                    </div>
                    <div class="category-card">
                        <img src="./assets/imgs/category_Section/Smart Watches.png" alt="Smart Watches category">
                        <h5>Smart Watches</h5>
                    </div>
                    <div class="category-card">
                        <img src="./assets/imgs/category_Section/Cameras.png" alt="Cameras category">
                        <h5>Cameras</h5>
                    </div>
                    <div class="category-card">
                        <img src="./assets/imgs/category_Section/Headphones.png" alt="Headphones category">
                        <h5>Headphones</h5>
                    </div>
                    <div class="category-card">
                        <img src="./assets/imgs/category_Section/Computers.png" alt="Computers category">
                        <h5>Computers</h5>
                    </div>
                    <div class="category-card">
                        <img src="./assets/imgs/category_Section/Gaming.png" alt="Gaming category">
                        <h5>Gaming</h5>
                    </div>
                </div>
            </div>
        </section>

    </main>
</body>

</html>
